<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="聚香缘管理">
    <title>聚香缘烧烤 · 管理后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif; background:#1a1412; color:#f0e6d8; overflow:hidden; height:100vh; }
        :root {
            --bg:#1a1412; --card:#2a221e; --orange:#ff8c3a; --orange-light:#ffa75a; --orange-dark:#e07020;
            --text:#f0e6d8; --text-dim:#9a8c82; --green:#4caf50; --red:#e74c3c; --border:#3d322c;
            --header-h:52px; --tab-h:56px;
        }
        .app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; overflow:hidden; }
        .header { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; height:var(--header-h); display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,#2a1f1a,#1a1412); border-bottom:1px solid var(--border); padding:0 12px; z-index:100; }
        .header .title { display:flex; align-items:baseline; gap:4px; }
        .header .title h1 { font-size:17px; font-weight:700; color:var(--orange); letter-spacing:1px; }
        .header .title span { font-size:11px; color:var(--text-dim); }
        .header .btn-refresh { width:34px; height:34px; border-radius:50%; border:none; background:var(--border); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .header .btn-refresh:active { background:#555; }
        .content { flex:1; margin-top:var(--header-h); margin-bottom:var(--tab-h); overflow-y:auto; overflow-x:hidden; padding:8px 10px calc(var(--tab-h)+12px); }
        .tab-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; height:var(--tab-h); display:flex; background:#1f1815; border-top:1px solid var(--border); z-index:100; }
        .tab-bar .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:var(--text-dim); cursor:pointer; padding:4px 0; }
        .tab-bar .tab.active { color:var(--orange); background:rgba(255,140,58,.08); }
        .tab-bar .tab .tab-icon { font-size:20px; }
        .tab-page { display:none; }
        .tab-page.active { display:block; }

        /* 密码门 */
        .lock-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:40px; }
        .lock-screen .lock-icon { font-size:48px; margin-bottom:16px; }
        .lock-screen h3 { font-size:18px; margin-bottom:20px; }
        .lock-screen input { width:100%; max-width:260px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-size:18px; text-align:center; outline:none; letter-spacing:4px; }
        .lock-screen input:focus { border-color:var(--orange); }
        .lock-screen .btn-unlock { margin-top:14px; background:var(--orange); color:#fff; border:none; border-radius:8px; padding:10px 40px; font-size:15px; font-weight:600; cursor:pointer; }
        .lock-screen .lock-hint { margin-top:20px; font-size:12px; color:var(--text-dim); }

        /* 订单卡片 */
        .order-card { background:var(--card); border-radius:10px; padding:10px 12px; margin-bottom:8px; border:1px solid var(--border); }
        .order-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
        .order-card-header .table-tag { background:var(--orange); color:#fff; border-radius:6px; padding:3px 10px; font-size:13px; font-weight:600; }
        .order-card-header .time { font-size:12px; color:var(--text-dim); }
        .order-card-header .btn-actions { display:flex; gap:4px; }
        .order-card-header .btn-actions button { background:none; border:none; color:var(--text-dim); font-size:15px; cursor:pointer; padding:0 2px; }
        .order-item { display:flex; align-items:center; gap:6px; padding:3px 0; font-size:13px; border-bottom:1px solid rgba(255,255,255,.04); min-height:30px; }
        .order-item .item-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .order-item .item-name.done { text-decoration:line-through; opacity:.5; }
        .order-item .chk { width:20px; height:20px; border-radius:50%; border:2px solid var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:11px; }
        .order-item .chk.done { border-color:var(--green); background:var(--green); color:#fff; }
        .order-item .note-tag { font-size:10px; color:var(--orange-light); background:rgba(255,140,58,.12); padding:1px 6px; border-radius:8px; }
        .order-item .qty-ctrl { display:flex; align-items:center; gap:2px; flex-shrink:0; }
        .order-item .qty-ctrl button { width:20px; height:20px; border:none; border-radius:3px; background:var(--border); color:var(--text); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .order-item .qty-ctrl .qty-num { min-width:18px; text-align:center; font-size:12px; font-weight:600; }
        .order-item .item-subtotal { font-size:12px; color:var(--orange); min-width:36px; text-align:right; font-weight:600; flex-shrink:0; }
        .order-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
        .order-card-footer .btn-add { background:var(--border); border:none; border-radius:6px; padding:5px 12px; font-size:12px; color:var(--text); cursor:pointer; }
        .order-card-footer .total-amount { font-size:15px; font-weight:700; color:var(--orange); }
        .order-card-footer .btn-checkout { background:var(--orange); border:none; border-radius:6px; padding:5px 14px; font-size:13px; font-weight:600; color:#fff; cursor:pointer; }

        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--text-dim); font-size:14px; }
        .empty-state .icon { font-size:40px; margin-bottom:10px; }

        /* 已完成 */
        .completed-card { background:var(--card); border-radius:10px; padding:10px 12px; margin-bottom:8px; border:1px solid var(--border); }
        .completed-card .comp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
        .completed-card .comp-header .table { font-size:14px; font-weight:600; color:var(--orange); }
        .completed-card .comp-header .time { font-size:11px; color:var(--text-dim); }
        .completed-card .comp-header .btn-del { background:none; border:none; color:var(--text-dim); font-size:15px; cursor:pointer; padding:0 4px; }
        .completed-card .comp-summary { font-size:12px; color:var(--text-dim); margin-bottom:4px; }
        .completed-card .comp-totals { display:flex; gap:16px; font-size:13px; }
        .completed-card .comp-totals .paid { color:var(--green); font-weight:600; }
        .completed-card .comp-totals .unpaid { color:var(--red); font-weight:700; }

        /* 菜单管理 */
        .btn-new-dish { display:block; width:100%; background:var(--orange); color:#fff; border:none; border-radius:8px; padding:10px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:10px; }
        .cat-tabs { display:flex; gap:4px; overflow-x:auto; margin-bottom:10px; flex-wrap:wrap; }
        .cat-tab { padding:4px 14px; border-radius:14px; border:1px solid var(--border); background:var(--bg); color:var(--text-dim); font-size:12px; cursor:pointer; white-space:nowrap; }
        .cat-tab.active { border-color:var(--orange); color:var(--orange); background:rgba(255,140,58,.1); }
        .menu-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.04); }
        .menu-item .mi-emoji { font-size:22px; flex-shrink:0; }
        .menu-item .mi-info { flex:1; }
        .menu-item .mi-info .mi-name { font-size:13px; }
        .menu-item .mi-info .mi-cat { font-size:10px; color:var(--text-dim); }
        .menu-item .mi-price { font-size:13px; color:var(--orange); font-weight:600; flex-shrink:0; }
        .menu-item .mi-actions { display:flex; gap:4px; flex-shrink:0; }
        .menu-item .mi-actions button { background:none; border:none; color:var(--text-dim); font-size:15px; cursor:pointer; padding:0 4px; }

        /* 营业额 */
        .stat-cards { display:flex; gap:8px; margin-bottom:12px; }
        .stat-card { flex:1; background:var(--card); border-radius:10px; padding:12px; border:1px solid var(--border); }
        .stat-card .stat-label { font-size:11px; color:var(--text-dim); margin-bottom:4px; }
        .stat-card .stat-value { font-size:22px; font-weight:700; color:var(--orange); }
        .time-btns { display:flex; gap:6px; margin-bottom:10px; }
        .time-btn { padding:4px 14px; border-radius:14px; border:none; background:var(--border); color:var(--text-dim); font-size:12px; cursor:pointer; }
        .time-btn.active { background:var(--orange); color:#fff; }
        .chart-container { background:var(--card); border-radius:10px; padding:12px; margin-bottom:10px; border:1px solid var(--border); height:160px; display:flex; align-items:flex-end; justify-content:space-around; gap:4px; }
        .chart-bar-wrap { display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
        .chart-bar { width:100%; max-width:32px; background:linear-gradient(to top,var(--orange-dark),var(--orange)); border-radius:3px 3px 0 0; min-height:2px; }
        .chart-bar-label { font-size:9px; color:var(--text-dim); margin-top:4px; text-align:center; }
        .chart-bar-value { font-size:9px; color:var(--orange); margin-bottom:2px; }
        .admin-order-list { background:var(--card); border-radius:10px; padding:8px 12px; border:1px solid var(--border); }
        .unpaid-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06); }
        .unpaid-item .row { display:flex; flex-wrap:wrap; align-items:center; gap:6px; width:100%; }
        .unpaid-actions { display:flex; gap:6px; margin-top:4px; }
        .unpaid-actions button { border:none; border-radius:4px; padding:3px 10px; font-size:11px; cursor:pointer; font-weight:500; }
        .unpaid-actions .btn-checkout { background:var(--orange); color:#fff; }
        .unpaid-actions .btn-note { background:var(--border); color:var(--text); }
        .unpaid-actions .btn-del { background:transparent; color:var(--text-dim); border:1px solid var(--border); }

        /* 弹窗 */
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:200; justify-content:center; align-items:center; padding:16px; }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--card); border-radius:14px; width:100%; max-width:440px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
        .modal-header h2 { font-size:16px; font-weight:600; }
        .modal-header .close-btn { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:0 4px; }
        .modal-body { flex:1; overflow-y:auto; padding:12px 16px; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; padding:12px 16px; border-top:1px solid var(--border); }
        .modal-footer .btn { background:var(--border); border:none; border-radius:8px; padding:8px 20px; font-size:14px; color:var(--text); cursor:pointer; }
        .modal-footer .btn.primary { background:var(--orange); color:#fff; font-weight:600; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
        .form-group input,.form-group select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:14px; outline:none; }
        .dish-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:4px; }
        .dish-item { background:var(--border); border-radius:8px; padding:8px 2px; text-align:center; cursor:pointer; position:relative; min-height:50px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid transparent; }
        .dish-item .dish-name { font-size:11px; color:var(--text); margin-bottom:1px; line-height:1.2; }
        .dish-item .dish-price { font-size:12px; color:var(--orange); font-weight:600; }
        .dish-item .dish-badge { position:absolute; top:-4px; right:-4px; background:var(--orange); color:#fff; border-radius:50%; width:20px; height:20px; font-size:11px; display:none; align-items:center; justify-content:center; font-weight:700; }
        .cat-group-title { font-size:15px; font-weight:600; color:var(--orange); text-align:center; margin:10px 0 6px; padding:4px 0; border-bottom:1px solid var(--border); }
        .confirm-body { text-align:center; padding:20px 16px; }
        .confirm-body .confirm-text { font-size:15px; margin-bottom:16px; }
        .confirm-body .confirm-actions { display:flex; gap:12px; justify-content:center; }
        .confirm-body .confirm-actions button { padding:8px 28px; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
        .checkout-amount { font-size:28px; font-weight:700; color:var(--orange); text-align:center; padding:12px 0; }
        .checkout-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-size:18px; text-align:center; outline:none; margin:4px 0; }
        .note-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-size:14px; outline:none; margin-top:6px; }
        .note-options { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
        .note-opt { padding:4px 12px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:12px; cursor:pointer; }
        .note-opt.selected { border-color:var(--orange); color:var(--orange); }

        /* 新建订单 FAB 按钮 */
        .fab-btn {
            position:fixed; bottom:calc(var(--tab-h) + 20px); right:20px;
            width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg, var(--orange), var(--orange-dark));
            color:#fff; border:none; font-size:28px; cursor:pointer; z-index:99;
            box-shadow:0 4px 16px rgba(255,140,58,.45); display:none;
            align-items:center; justify-content:center; transition:all .25s;
        }
        .fab-btn.show { display:flex; }
        .fab-btn:active { transform:scale(.9); box-shadow:0 2px 8px rgba(255,140,58,.3); }
        .fab-btn::after { content:'＋'; font-weight:300; line-height:1; }

        /* 新建订单弹窗 */
        .new-order-modal { background:var(--card); border-radius:14px; width:100%; max-width:440px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
        .new-order-modal .nom-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
        .new-order-modal .nom-header h2 { font-size:16px; font-weight:600; }
        .new-order-modal .nom-body { flex:1; overflow-y:auto; padding:16px; }
        .new-order-modal .nom-body textarea { width:100%; min-height:120px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:14px; font-family:inherit; resize:vertical; outline:none; line-height:1.6; }
        .new-order-modal .nom-body textarea:focus { border-color:var(--orange); }
        .new-order-modal .nom-body .nom-hint { font-size:12px; color:var(--text-dim); margin-top:10px; line-height:1.6; }
        .new-order-modal .nom-footer { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-top:1px solid var(--border); gap:8px; }
        .new-order-modal .nom-footer .btn { border:none; border-radius:8px; padding:10px 22px; font-size:14px; cursor:pointer; font-weight:600; }
        .new-order-modal .nom-footer .btn.cancel { background:var(--border); color:var(--text); }
        .new-order-modal .nom-footer .btn.submit { background:var(--orange); color:#fff; flex:1; }

        /* 确认订单弹窗（复用 voice-result 样式） */
        .voice-result { background:var(--card); border-radius:14px; width:100%; max-width:440px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
        .voice-result .vr-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
        .voice-result .vr-header h2 { font-size:16px; font-weight:600; }
        .voice-result .vr-body { flex:1; overflow-y:auto; padding:12px 16px; }
        .voice-result .vr-body .vr-section { margin-bottom:12px; }
        .voice-result .vr-body .vr-label { font-size:11px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; }
        .voice-result .vr-body .vr-value { font-size:14px; color:var(--text); background:var(--bg); border-radius:8px; padding:8px 12px; }
        .voice-result .vr-body .vr-value.editable { border:1px solid var(--border); outline:none; }
        .voice-result .vr-body .vr-value.editable:focus { border-color:var(--orange); }
        .voice-result .vr-body .vr-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04); }
        .voice-result .vr-body .vr-item .vr-dish-name { flex:1; font-size:13px; }
        .voice-result .vr-footer { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-top:1px solid var(--border); }
        .voice-result .vr-footer .btn { border:none; border-radius:8px; padding:8px 20px; font-size:14px; cursor:pointer; }
        .voice-result .vr-footer .btn.cancel { background:var(--border); color:var(--text); }
        .voice-result .vr-footer .btn.confirm { background:var(--orange); color:#fff; font-weight:600; }
        .voice-spinner { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; gap:16px; }
        .voice-spinner .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .voice-spinner .spinner-text { font-size:14px; color:var(--text-dim); }
        .note-tag { font-size:10px; color:var(--orange-light); background:rgba(255,140,58,.12); padding:1px 6px; border-radius:8px; white-space:nowrap; }
    </style>
</head>
<body>
<!-- 二维码点餐入口：URL 带 ?table= 参数时自动跳转点餐页 -->
<script>
(function(){
    var p = new URLSearchParams(location.search);
    if (p.get('table')) { location.replace('order.html' + location.search); }
})();
</script>
<div class="app" id="app">
    <!-- 密码门 -->
    <div id="lockScreen" class="lock-screen">
        <div class="lock-icon">🔐</div>
        <h3>聚香缘管理后台</h3>
        <input type="password" id="pwdInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')unlock()">
        <button class="btn-unlock" onclick="unlock()">进入</button>
        <div class="lock-hint">仅限老板和员工使用</div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" style="display:none;">
        <div class="header">
            <div class="title"><h1>聚香缘管理</h1><span>· 后台</span></div>
            <button class="btn-refresh" onclick="refreshAll()">🔄</button>
        </div>
        <div class="content" id="contentArea">
            <div id="tabOrders" class="tab-page active"></div>
            <div id="tabCompleted" class="tab-page"></div>
            <div id="tabMenu" class="tab-page"></div>
            <div id="tabAdmin" class="tab-page"></div>
        </div>
        <div class="tab-bar">
            <div class="tab active" data-tab="orders" onclick="switchTab('orders')"><span class="tab-icon">📋</span>进行中</div>
            <div class="tab" data-tab="completed" onclick="switchTab('completed')"><span class="tab-icon">✅</span>已完成</div>
            <div class="tab" data-tab="menu" onclick="switchTab('menu')"><span class="tab-icon">📝</span>菜单</div>
            <div class="tab" data-tab="admin" onclick="switchTab('admin')"><span class="tab-icon">📊</span>营业额</div>
        </div>

        <!-- 新建订单 FAB 按钮 -->
        <button class="fab-btn" id="fabBtn" onclick="openNewOrder()"></button>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
</div>

// ========== 基础数据 ==========
var CATEGORY_ORDER = ["烧烤", "小炒", "美食", "锅粥", "酒水", "其他"];
var CAT_MAP = { "烧烤":"烧烤", "烤蔬菜":"烧烤", "小吃系列":"小炒", "精美小吃":"美食", "牛蛙":"美食", "粥类":"锅粥", "饮品":"酒水", "酒水":"酒水" };
var dishes = [];
var orders = [];
var tab = 'orders';
var realtimeSub = null;
var isRefreshing = false;

// ========== 工具函数 ==========
function gd(id) { var d = dishes.find(function(x) { return x.id === id; }); return d || { name:"已删除菜品", price:0, emoji:"❓" }; }
function ot(o) { if (!o||!o.items||!Array.isArray(o.items)) return 0; return o.items.reduce(function(s,i) { var d=gd(i.dishId); return s+d.price*i.qty; },0); }
function os(o) { if (!o||!o.items) return ""; var a=o.items.slice(0,3).map(function(i){ var d=gd(i.dishId); return d.name; }); return a.join("、")+(o.items.length>3?" ...":""); }
function gbd(d) { var h=d.getHours(); if(h>=8) return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()-1).getTime(); }
function sbd(t1,t2) { return gbd(new Date(t1))===gbd(new Date(t2)); }
function cm() { document.getElementById('modalOverlay').classList.remove('show'); }
function sm(h) { document.getElementById('modalOverlay').innerHTML=h; document.getElementById('modalOverlay').classList.add('show'); }
document.getElementById('modalOverlay').onclick=function(e){ if(e.target===this)cm(); };

// Supabase 操作包装：自动检查 error 并抛出
async function dbOp(result) {
    if (result.error) { console.error('Supabase error:', result.error); throw new Error(result.error.message || '数据库操作失败'); }
    return result.data;
}

// ========== 数据加载 ==========
async function loadAllData() {
    try {
        var r1 = await supabase.from('dishes').select('*');
        if (r1.data&&r1.data.length) dishes = r1.data;

        var r2 = await supabase.from('orders').select('*');
        if (r2.data) {
            orders = r2.data.map(function(o) {
                var items = o.items;
                if (typeof items==='string'){ try{ items=JSON.parse(items); }catch(e){ items=[]; } }
                if (!Array.isArray(items)) items=[];
                return Object.assign({},o,{items:items});
            });
        }
        setupRealtime();
        switchTab('orders');
    } catch(e) { console.warn('加载失败',e); }
}

async function refreshAll() {
    if (isRefreshing) return;
    isRefreshing = true;
    try {
        var r1 = await supabase.from('dishes').select('*');
        if (r1.data) dishes = r1.data;
        var r2 = await supabase.from('orders').select('*');
        if (r2.data) {
            orders = r2.data.map(function(o) {
                var items = o.items;
                if (typeof items==='string'){ try{ items=JSON.parse(items); }catch(e){ items=[]; } }
                if (!Array.isArray(items)) items=[];
                return Object.assign({},o,{items:items});
            });
        }
        var currentTab = tab;
        if (currentTab==='orders') ro(); else if (currentTab==='completed') rc(); else if (currentTab==='menu') rm(); else if (currentTab==='admin') ra();
    } catch(e) { console.warn('刷新失败',e); }
    isRefreshing = false;
}

function setupRealtime() {
    if (realtimeSub) { try{ realtimeSub.unsubscribe(); }catch(e){} }
    realtimeSub = supabase.channel('admin-realtime')
        .on('postgres_changes',{event:'*',schema:'public',table:'orders'},function(){ refreshAll(); })
        .on('postgres_changes',{event:'*',schema:'public',table:'dishes'},function(){ refreshAll(); })
        .subscribe();
}

document.addEventListener('visibilitychange',function(){ if(!document.hidden&&unlocked) refreshAll(); });

function switchTab(t) {
    tab = t;
    document.querySelectorAll(".tab").forEach(function(x){ x.classList.toggle("active",x.dataset.tab===t); });
    document.querySelectorAll(".tab-page").forEach(function(x){ x.classList.remove("active"); });
    var e = document.getElementById("tab"+t[0].toUpperCase()+t.slice(1));
    if (e) e.classList.add("active");
    // FAB 按钮仅在进行中页显示
    var fab = document.getElementById("fabBtn");
    var ct = document.getElementById("contentArea");
    if (t==="orders") { fab.classList.add("show"); ct.style.marginBottom=""; }
    else { fab.classList.remove("show"); ct.style.marginBottom=""; }
    if (t==="orders") ro(); else if (t==="completed") rc(); else if (t==="menu") rm(); else if (t==="admin") ra();
}

// ========== 进行中订单 ==========
function ro() {
    var e = document.getElementById("tabOrders");
    var a = orders.filter(function(x){ return x.status==="active"; }).sort(function(a,b){ return b.id-a.id; });
    if (!a.length) { e.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>暂无进行中的订单</div></div>'; return; }
    e.innerHTML = a.map(function(o) {
        var card = '<div class="order-card">';
        card += '<div class="order-card-header">';
        card += '<div style="display:flex;align-items:center;gap:8px"><span class="table-tag">'+o.table+'</span><span class="time">'+o.time+'</span></div>';
        card += '<div class="btn-actions"><button onclick="cancOrder('+o.id+')">✕</button></div>';
        card += '</div>';
        if (o.special_requirements) card += '<div style="font-size:11px;color:var(--orange-light);padding:2px 0 4px 2px">📝 '+o.special_requirements+'</div>';
        (o.items||[]).forEach(function(it,i){
            var d = gd(it.dishId);
            var st = d.price * it.qty;
            var dc = it.done ? " done" : "";
            card += '<div class="order-item">';
            card += '<div class="chk'+(it.done?" done":"")+'" onclick="togDone('+o.id+','+i+')">'+(it.done?"✓":"")+'</div>';
            card += '<span class="item-name'+dc+'">'+ (d.emoji||"🍽") + ' ' + d.name + (it.note?' <span class="note-tag">'+it.note+'</span>':'') + '</span>';
            card += '<div class="qty-ctrl"><button onclick="chgQty('+o.id+','+i+',-1)">-</button><span class="qty-num">'+it.qty+'</span><button onclick="chgQty('+o.id+','+i+',1)">+</button></div>';
            card += '<span class="item-subtotal">¥'+st+'</span>';
            card += '</div>';
        });
        card += '<div class="order-card-footer">';
        card += '<button class="btn-add" onclick="addDish('+o.id+')">+ 加菜</button>';
        card += '<div style="display:flex;align-items:center;gap:8px"><span class="total-amount">¥'+ot(o)+'</span><button class="btn-checkout" onclick="checkout('+o.id+')">结账</button></div>';
        card += '</div></div>';
        return card;
    }).join('');
}

async function togDone(oid, idx) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (o&&o.items[idx]) { o.items[idx].done=!o.items[idx].done; await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'})); ro(); }
}
async function chgQty(oid, idx, d) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (!o||!o.items[idx]) return;
    o.items[idx].qty=Math.max(0,o.items[idx].qty+d);
    if (!o.items[idx].qty) o.items.splice(idx,1);
    await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'}));
    ro();
}
function cancOrder(oid) {
    sm('<div class="modal"><div class="modal-header"><h2>取消订单</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="confirm-body"><div class="confirm-text">确认取消该订单？</div><div class="confirm-actions"><button class="btn" onclick="cm()">返回</button><button class="btn primary" onclick="doCancOrder('+oid+')">确认取消</button></div></div></div>');
}
async function doCancOrder(oid) {
    await dbOp(supabase.from('orders').delete().eq('id',oid));
    orders = orders.filter(function(x){ return x.id!==oid; });
    cm(); ro();
}

// ========== 结账 ==========
function checkout(oid) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (!o) return;
    var t = ot(o);
    sm('<div class="modal"><div class="modal-header"><h2>结账 · '+o.table+'</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="modal-body"><div style="font-size:13px;color:var(--text-dim);margin-bottom:4px">订单金额</div><div class="checkout-amount">¥'+t+'</div><div style="font-size:13px;color:var(--text-dim);margin-bottom:4px">实收金额</div><input class="checkout-input" id="ca" value="'+t+'" type="number" step="1"><button class="btn" style="display:block;margin:4px auto 0;background:none;border:none;color:var(--orange);font-size:12px;cursor:pointer;text-decoration:underline" onclick=\'document.getElementById("ca").value='+t+'\'>全额</button></div><div class="modal-footer" style="justify-content:space-between"><button class="btn" style="background:var(--orange-dark);color:#fff;font-weight:500" onclick="markUnpaid('+oid+')">未收款</button><div><button class="btn" onclick="cm()">取消</button><button class="btn primary" onclick="doCheckout('+oid+','+t+')">确认完成</button></div></div></div>');
}
async function doCheckout(oid, t) {
    var paid = parseFloat(document.getElementById('ca').value) || t;
    var o = orders.find(function(x){ return x.id===oid; });
    if (o) { o.status="completed"; o.paid_amount=paid; o.completed_at=Date.now(); o.unpaid_remark=""; await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'})); }
    cm(); ro(); if (tab==="admin") ra();
}
async function markUnpaid(oid) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (o) { o.status="completed"; o.paid_amount=0; o.completed_at=Date.now(); o.unpaid_remark=""; await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'})); }
    cm(); ro(); if (tab==="admin") ra();
}

// ========== 加菜 ==========
var addAds = {}, addAdt = null;
function addDish(oid) { addAdt=oid; addAds={}; bnm(true); }
function bnm(isA) {
    var html = '<div class="modal"><div class="modal-header"><h2>加菜</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="modal-body">';
    CATEGORY_ORDER.forEach(function(cat) {
        var items = dishes.filter(function(d){ return (CAT_MAP[d.cat]||d.cat)===cat; });
        if (!items.length) return;
        html += '<div class="cat-group-title">'+cat+'</div><div class="dish-grid">';
        items.forEach(function(d) {
            html += '<div class="dish-item" onclick="ads('+d.id+')"><div class="dish-name">'+d.name+'</div><div class="dish-price">¥'+d.price+'</div><div class="dish-badge" id="ab_'+d.id+'"></div></div>';
        });
        html += '</div>';
    });
    html += '</div><div class="modal-footer" style="justify-content:space-between"><span>已选 <strong id="addCount">0</strong> 份</span><button class="btn primary" onclick="cda()">确认追加</button></div></div>';
    sm(html);
}
function ads(id) { addAds[id]=(addAds[id]||0)+1; var b=document.getElementById('ab_'+id); if(b){ b.style.display='flex'; b.textContent=addAds[id]; } var cnt=document.getElementById('addCount'); if(cnt) cnt.textContent=Object.values(addAds).reduce(function(a,b){return a+b;},0); }
async function cda() {
    var its = Object.entries(addAds).filter(function(a){ return a[1]>0; }).map(function(a){ return {dishId:+a[0],qty:a[1],note:"",done:false}; });
    if (!its.length){ cm(); return; }
    var o = orders.find(function(x){ return x.id===addAdt; });
    if (o) {
        if (!o.items) o.items=[];
        its.forEach(function(it){
            var ex = o.items.find(function(x){ return x.dishId===it.dishId&&!x.note&&!x.done; });
            if (ex) ex.qty+=it.qty; else o.items.push(it);
        });
        await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'}));
    }
    cm(); addAds={}; ro();
}

// ========== 新建订单 ==========
var TABLES = ["外卖","内1","内2","内3","内4","内5","内6","内7","内8","内9","外1","外2","外3","外4","外5","外6","外7","外8","外9"];
var DEEPSEEK_KEY = 'sk-05515694b8a74eac949117aaacc79e82';

function openNewOrder() {
    var h = '<div class="new-order-modal"><div class="nom-header"><h2>🆕 新建订单</h2><button class="close-btn" onclick="cm()">✕</button></div>';
    h += '<div class="nom-body">';
    h += '<textarea id="orderTextInput" placeholder="在此输入订单信息，例如：&#10;&#10;内3 烤牛肉串10串 烤生蚝5个 可乐2瓶&#10;微辣 打包&#10;&#10;AI 将自动识别菜品、数量和特殊要求" autofocus></textarea>';
    h += '<div class="nom-hint">💡 输入格式：<b>桌号 菜品名称+数量 特殊要求</b><br>多个菜品用空格或逗号分隔，AI 会自动匹配菜单并整理</div>';
    h += '</div>';
    h += '<div class="nom-footer">';

async function submitTextOrder() {
    var input = document.getElementById('orderTextInput');
    if (!input) return;

    if (!text) { alert('请输入订单信息'); return; }

    // 显示加载状态
    sm('<div class="voice-result"><div class="vr-header"><h2>AI 解析中...</h2></div><div class="vr-body"><div class="voice-spinner"><div class="spinner"></div><div class="spinner-text">正在分析订单内容...</div><div style="font-size:12px;color:var(--text-dim);margin-top:4px;text-align:center;max-height:80px;overflow-y:auto">'+escapeHtml(text)+'</div></div></div></div>');

    try {
        var order = await callDeepSeek(text);
        showVoiceOrder(order, text);
    } catch(e) {
        console.error('DeepSeek error:', e);
        cm();
        alert('AI 解析失败: ' + (e.message||'网络错误') + '\n\n输入内容: ' + text + '\n\n请重试或手动录入。');
    }
}

async function callDeepSeek(text) {
    var dishList = dishes.map(function(d) {
        return d.id + ': ' + d.name + ' (¥' + d.price + ') [' + d.cat + ']';
    }).join('\n');

    var prompt = '你是一个餐厅点餐助手。请将以下语音点餐内容解析为结构化订单JSON。\n\n' +
        '可用桌号: ' + TABLES.join(', ') + '\n\n' +
        '可用菜品(ID:名称(价格)[分类]):\n' + dishList + '\n\n' +
        '规则:\n' +
        '1. table: 从语音中提取桌号，如果没提到桌号，默认设为"外卖"\n' +
        '2. items: 匹配菜品ID(name仅用于验证)，qty为整数，note为该项的特殊口味(如辣度等)，没有则为空字符串\n' +
        '3. special_requirements: 整个订单的特殊要求(如"打包"、"快点上"等)，没有则为空字符串\n' +
        '4. 如果菜品名模糊，尽量匹配最相近的\n\n' +
        '请只返回纯JSON，不要任何解释或markdown标记:\n' +
        '{"table":"桌号","items":[{"dishId":ID,"name":"名称","qty":数量,"note":"备注"}],"special_requirements":"特殊要求"}\n\n' +
        '语音内容: ' + text;

    var messages = [{ role: 'user', content: prompt }];
    var data;

    // 优先通过 Netlify 代理（解决 CORS）
    try {
        var resp = await fetch('/api/deepseek', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: messages, temperature: 0.1, max_tokens: 1024 })
        });
        if (resp.ok) { data = await resp.json(); }
        else { throw new Error('proxy fail'); }
    } catch(proxyErr) {
        // 代理不可用时尝试直连（可能有 CORS 问题）
        console.warn('代理不可用，尝试直连:', proxyErr.message);
        var resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + DEEPSEEK_KEY
            },
            body: JSON.stringify({ model: 'deepseek-chat', messages: messages, temperature: 0.1, max_tokens: 1024 })
        });
        if (!resp.ok) {
            var errText = await resp.text();
            throw new Error('DeepSeek API error ' + resp.status + ': ' + errText);
        }
        data = await resp.json();
    }

    var content = data.choices[0].message.content.trim();
    content = content.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');

    var order;
    try { order = JSON.parse(content); } catch(e) {
        // 尝试提取 JSON
        var m = content.match(/\{[\s\S]*\}/);
        if (m) { try { order = JSON.parse(m[0]); } catch(e2) {} }
        if (!order) throw new Error('无法解析 DeepSeek 返回的 JSON: ' + content);
    }

    // 验证并修复
    if (!order.table || !TABLES.includes(order.table)) {
        order.table = '外卖';
    }
    if (!order.items || !Array.isArray(order.items)) {
        order.items = [];
    }
    order.items = order.items.map(function(it) {
        var d = dishes.find(function(x) { return x.id === it.dishId; });
        if (!d) {
            // 尝试按名字匹配
            d = dishes.find(function(x) { return x.name === it.name || x.name.includes(it.name) || (it.name&&it.name.includes(x.name)); });
            if (d) it.dishId = d.id;
        }
        if (!d) d = { name: it.name||'未知菜品', price:0, emoji:'❓' };
        return {
            dishId: it.dishId || 0,
            qty: Math.max(1, parseInt(it.qty) || 1),
            note: it.note || '',
            done: false,
            _name: d.name,
            _price: d.price,
            _emoji: d.emoji||'🍽'
        };
    }).filter(function(it) { return it.dishId > 0; });
    if (!order.special_requirements) order.special_requirements = '';

    return order;
}

function showVoiceOrder(order, rawText) {

    h += '<div class="vr-body">';

    // 桌号
    h += '<div class="vr-section"><div class="vr-label">🪑 桌号</div>';
    h += '<select id="voTable" class="vr-value editable" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none">';
    TABLES.forEach(function(t) {
        h += '<option value="'+t+'"'+(order.table===t?' selected':'')+'>'+t+'</option>';
    });
    h += '</select></div>';

    // 菜品列表
    h += '<div class="vr-section"><div class="vr-label">🍽 菜品</div>';
    if (!order.items.length) {
        h += '<div style="font-size:13px;color:var(--text-dim);padding:8px">未识别到菜品</div>';
    } else {
        order.items.forEach(function(it, i) {
            h += '<div class="vr-item">';
            h += '<span style="font-size:18px">'+(it._emoji||'🍽')+'</span>';
            h += '<span class="vr-dish-name">'+it._name;
            if (it.note) h += ' <span class="note-tag">'+it.note+'</span>';
            h += '</span>';
            h += '<div class="qty-ctrl"><button onclick="voQty('+i+',-1)">-</button><span class="qty-num" id="voQty_'+i+'">'+it.qty+'</span><button onclick="voQty('+i+',1)">+</button></div>';
            h += '<button class="btn-remove" style="background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer" onclick="voDel('+i+')">✕</button>';
            h += '</div>';
        });
    }
    h += '</div>';

    // 特殊要求
    h += '<div class="vr-section"><div class="vr-label">📝 特殊要求</div>';
    h += '<input class="vr-value editable" id="voSpecial" value="'+escapeHtml(order.special_requirements||'')+'" placeholder="如：打包、快点上、少放盐..." style="width:100%">';
    h += '</div>';

    // 原始输入
    h += '<div class="vr-section"><div class="vr-label" style="cursor:pointer;display:flex;align-items:center;gap:4px" onclick="var x=document.getElementById(\'voRaw\');x.style.display=x.style.display==\'none\'?\'\':\'none\'">📝 原始输入 <span style="font-size:10px">▸</span></div>';
    h += '<div id="voRaw" style="display:none;font-size:12px;color:var(--text-dim);background:var(--bg);border-radius:8px;padding:8px 12px;margin-top:4px">'+escapeHtml(rawText)+'</div>';
    h += '</div>';

    h += '</div>';
    h += '<div class="vr-footer">';
    h += '<button class="btn cancel" onclick="cm()">取消</button>';
    h += '<button class="btn confirm" onclick="confirmVoiceOrder()">✅ 确认下单</button>';
    h += '</div></div>';

    window._voiceOrder = order;
    window._voiceRawText = rawText;
    sm(h);
}

// 确认弹窗内修改数量
function voQty(idx, delta) {
    var o = window._voiceOrder;
    if (!o || !o.items[idx]) return;
    o.items[idx].qty = Math.max(0, o.items[idx].qty + delta);
    if (o.items[idx].qty <= 0) { o.items.splice(idx, 1); showVoiceOrder(o, window._voiceRawText||''); return; }
    var el = document.getElementById('voQty_'+idx);
    if (el) el.textContent = o.items[idx].qty;
}
function voDel(idx) {
    var o = window._voiceOrder;
    if (!o || !o.items[idx]) return;
    o.items.splice(idx, 1);
    window._voiceOrder = o;
    showVoiceOrder(o, window._voiceRawText||'');
}

async function confirmVoiceOrder() {
    var order = window._voiceOrder;
    if (!order) return;

    // 读取用户可能修改的值
    var tbl = document.getElementById('voTable');
    if (tbl) order.table = tbl.value;
    var spec = document.getElementById('voSpecial');
    if (spec) order.special_requirements = spec.value.trim();

    // 移除临时字段
    var items = order.items.map(function(it) {
        return { dishId: it.dishId, qty: it.qty, note: it.note||'', done: false };
    }).filter(function(it) { return it.qty > 0 && it.dishId > 0; });

    if (!items.length) { alert('请至少选择一个菜品'); return; }

    var now = new Date();
    var time = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
    var newOrder = {
        id: Date.now(),
        table: order.table,
        time: time,
        created_at: Date.now(),
        items: items,
        status: 'active',
        paid_amount: 0,
        completed_at: null,
        unpaid_remark: '',
        special_requirements: order.special_requirements||''
    };

    try {
        await dbOp(supabase.from('orders').insert(newOrder));
        orders.unshift(newOrder);
        cm();
        window._voiceOrder = null;
        ro();
        // 震动反馈
        if (navigator.vibrate) navigator.vibrate([30,50,30]);
    } catch(e) {
        console.error('保存失败', e);
        alert('保存失败: ' + (e.message||'网络错误'));
    }
}

function escapeHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== 已完成 ==========
function rc() {
    var e = document.getElementById("tabCompleted");
    var c = orders.filter(function(x){ return x.status==="completed"; }).sort(function(a,b){ return (b.completed_at||0)-(a.completed_at||0); });
    if (!c.length) { e.innerHTML='<div class="empty-state"><div class="icon">✅</div><div>暂无已完成订单</div></div>'; return; }
    e.innerHTML = c.map(function(o) {
        var t = ot(o);
        var paidDisplay = (o.paid_amount===0) ? '<span class="unpaid">未收款</span>' : '<span class="paid">实收 ¥'+(o.paid_amount||t)+'</span>';
        return '<div class="completed-card">'+
            '<div class="comp-header"><span class="table">'+o.table+'</span><div style="display:flex;align-items:center;gap:8px"><span class="time">'+o.time+'</span><button class="btn-del" onclick="delCompOrder('+o.id+')">✕</button></div></div>'+
            '<div class="comp-summary">'+os(o)+'</div>'+
            '<div class="comp-totals"><span>合计 ¥'+t+'</span>'+paidDisplay+'</div>'+
            '</div>';
    }).join('');
}
async function delCompOrder(oid) {
    if (!confirm('确认删除该已完成订单？')) return;
    await dbOp(supabase.from('orders').delete().eq('id',oid));
    orders = orders.filter(function(x){ return x.id!==oid; });
    rc(); if (tab==='admin') ra();
}

// ========== 菜单管理 ==========
var menuCat = "全部";
function rm() {
    var e = document.getElementById("tabMenu");
    var cats = ["全部"].concat(CATEGORY_ORDER);
    var f = menuCat==="全部" ? dishes : dishes.filter(function(d){ return (CAT_MAP[d.cat]||d.cat)===menuCat; });
    var h = '<button class="btn-new-dish" onclick="sndm()">＋ 新建菜品</button>';
    h += '<div class="cat-tabs">'+cats.map(function(c){ return '<button class="cat-tab'+(c===menuCat?' active':'')+'" onclick="smc(\''+c+'\')">'+c+'</button>'; }).join('')+'</div>';
    h += f.map(function(d) {
        return '<div class="menu-item"><span class="mi-emoji">'+(d.emoji||"🍽")+'</span><div class="mi-info"><div class="mi-name">'+d.name+'</div><div class="mi-cat">'+d.cat+'</div></div><span class="mi-price">¥'+d.price+'</span><div class="mi-actions"><button onclick="ed('+d.id+')">✎</button><button onclick="dd('+d.id+')">🗑</button></div></div>';
    }).join('');
    e.innerHTML = h;
}
function smc(c) { menuCat=c; rm(); }
var editDishId = null;
function sndm() { editDishId=null; showDishForm('新建菜品'); }
function ed(id) { var d=gd(id); if(d.name==="已删除菜品") return; editDishId=id; showDishForm('编辑菜品',d); }
function showDishForm(title, d) {
    d = d || {};
    var h = '<div class="modal"><div class="modal-header"><h2>'+title+'</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="modal-body">';
    h += '<div class="form-group"><label>名称</label><input id="fn" value="'+(d.name||'')+'" placeholder="菜品名称"></div>';
    h += '<div class="form-group"><label>价格 ¥</label><input id="fp" type="number" value="'+(d.price||0)+'" placeholder="0"></div>';
    h += '<div class="form-group"><label>分类</label><select id="fc">'+CATEGORY_ORDER.map(function(c){ return '<option value="'+c+'"'+(d.cat===c?' selected':'')+'>'+c+'</option>'; }).join('')+'</select></div>';
    h += '<div class="form-group"><label>Emoji</label><input id="fe" value="'+(d.emoji||'🍽')+'" placeholder="🍽"></div>';
    h += '</div><div class="modal-footer"><button class="btn" onclick="cm()">取消</button><button class="btn primary" onclick="sd()">保存</button></div></div>';
    sm(h);
}
async function sd() {
    var n = document.getElementById('fn').value.trim();
    var p = +document.getElementById('fp').value || 0;
    var c = document.getElementById('fc').value;
    var e = document.getElementById('fe').value.trim() || '🍽';
    if (!n) { alert('请输入名称'); return; }
    if (editDishId) {
        var d = gd(editDishId);
        if (d.name!=="已删除菜品") { d.name=n; d.price=p; d.cat=c; d.emoji=e; await dbOp(supabase.from('dishes').upsert(d,{onConflict:'id'})); }
    } else {
        var maxId = dishes.reduce(function(m,d){ return Math.max(m,d.id); },0);
        await dbOp(supabase.from('dishes').insert({ id:maxId+1, name:n, cat:c, price:p, emoji:e }));
    }
    var r1 = await supabase.from('dishes').select('*'); if (r1.data) dishes = r1.data;
    cm(); rm();
}
async function dd(id) {
    if (!confirm('确认删除？')) return;
    await dbOp(supabase.from('dishes').delete().eq('id',id));
    dishes = dishes.filter(function(d){ return d.id!==id; });
    rm();
}

// ========== 营业额 ==========
var adminPeriod = 'day';
function ra() {
    var e = document.getElementById("tabAdmin");
    var c = orders.filter(function(o){ return o.status==="completed"&&o.completed_at; });
    var to = c.filter(function(o){ return sbd(o.completed_at,Date.now()); });
    var tr = to.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0);
    var tr2 = c.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0);
    var cd=[], cl=[], n=new Date();

    if (adminPeriod==="day") { for(var i=6;i>=0;i--){ var d=new Date(n); d.setDate(d.getDate()-i); var ds=gbd(d); var de=ds+24*3600000; var oo=c.filter(function(o){ return o.completed_at>=ds&&o.completed_at<de; }); var r=oo.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0); cd.push(r); cl.push((d.getMonth()+1)+"/"+d.getDate()); } }
    if (adminPeriod==="week") { for(var i=3;i>=0;i--){ var end=new Date(n); end.setDate(end.getDate()-i*7); var start=new Date(end); start.setDate(start.getDate()-6); var oo=c.filter(function(o){ var t=new Date(o.completed_at); return t>=start&&t<=end; }); var r=oo.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0); cd.push(r); cl.push((start.getMonth()+1)+"/"+start.getDate()); } }
    if (adminPeriod==="month") { for(var i=5;i>=0;i--){ var d=new Date(n.getFullYear(),n.getMonth()-i,1); var ed=new Date(d.getFullYear(),d.getMonth()+1,1); var oo=c.filter(function(o){ return o.completed_at>=d.getTime()&&o.completed_at<ed.getTime(); }); var r=oo.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0); cd.push(r); cl.push((d.getMonth()+1)+"月"); } }
    if (adminPeriod==="year") { for(var i=3;i>=0;i--){ var y=n.getFullYear()-i; var oo=c.filter(function(o){ return new Date(o.completed_at).getFullYear()===y; }); var r=oo.reduce(function(s,o){ return s+(o.paid_amount||ot(o)); },0); cd.push(r); cl.push(y+"年"); } }

    var mx = Math.max.apply(null,cd.concat([1]));
    var unpaidOrders = c.filter(function(o){ return o.paid_amount===0; }).sort(function(a,b){ return (b.completed_at||0)-(a.completed_at||0); });

    var h = '<div class="stat-cards"><div class="stat-card"><div class="stat-label">今日营业额</div><div class="stat-value">¥'+tr+'</div></div><div class="stat-card"><div class="stat-label">总营业额</div><div class="stat-value">¥'+tr2+'</div></div></div>';
    h += '<div class="time-btns"><button class="time-btn'+(adminPeriod==="day"?" active":"")+'" onclick="sap(\'day\')">日</button><button class="time-btn'+(adminPeriod==="week"?" active":"")+'" onclick="sap(\'week\')">周</button><button class="time-btn'+(adminPeriod==="month"?" active":"")+'" onclick="sap(\'month\')">月</button><button class="time-btn'+(adminPeriod==="year"?" active":"")+'" onclick="sap(\'year\')">年</button></div>';
    h += '<div class="chart-container">'+cd.map(function(v,i){ var p=v/mx*100; return '<div class="chart-bar-wrap"><div class="chart-bar-value">¥'+v+'</div><div class="chart-bar" style="height:'+Math.max(p,2)+'%"></div><div class="chart-bar-label">'+cl[i]+'</div></div>'; }).join('')+'</div>';
    h += '<div class="admin-order-list"><div style="font-weight:600;font-size:14px;color:var(--orange);padding:4px 0 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span>💰 未收款订单</span><span style="font-size:12px;color:var(--text-dim);font-weight:400">共 '+unpaidOrders.length+' 笔</span></div>';
    if (unpaidOrders.length) {
        h += unpaidOrders.map(function(o){
            var t = ot(o);
            var date = new Date(o.completed_at);
            var ds = date.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
            return '<div class="unpaid-item"><div class="row"><span style="font-weight:600;color:var(--orange);font-size:13px">'+o.table+'</span><span style="font-size:11px;color:var(--text-dim)">'+ds+'</span><span style="font-size:12px;color:var(--text-dim);flex:1;min-width:60px">'+os(o)+'</span><span style="font-size:14px;color:var(--orange);font-weight:700">¥'+t+'</span></div>'+
                (o.unpaid_remark?'<div style="font-size:11px;color:var(--orange-light);padding:2px 0 0 4px">📝 '+o.unpaid_remark+'</div>':'')+
                '<div class="unpaid-actions"><button class="btn-checkout" onclick="checkout('+o.id+')">💰 结账</button><button class="btn-note" onclick="editUnpaidRemark('+o.id+')">📝 备注</button><button class="btn-del" onclick="delUnpaidOrder('+o.id+')">🗑 删除</button></div></div>';
        }).join('');
    } else {
        h += '<div style="text-align:center;padding:16px 0;color:var(--text-dim);font-size:13px">✅ 暂无未收款订单</div>';
    }
    h += '</div>';
    e.innerHTML = h;
}
function sap(p) { adminPeriod=p; ra(); }
function editUnpaidRemark(oid) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (!o) return;
    var cur = o.unpaid_remark||"";
    sm('<div class="modal"><div class="modal-header"><h2>备注</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="modal-body"><input class="note-input" id="urInput" value="'+cur.replace(/"/g,'&quot;')+'" placeholder="输入备注信息..."></div><div class="modal-footer"><button class="btn" onclick="cm()">取消</button><button class="btn primary" onclick="saveUnpaidRemark('+oid+')">保存</button></div></div>');
}
async function saveUnpaidRemark(oid) {
    var o = orders.find(function(x){ return x.id===oid; });
    if (!o) return;
    o.unpaid_remark = document.getElementById('urInput').value.trim();
    await dbOp(supabase.from('orders').upsert(o,{onConflict:'id'}));
    cm(); if (tab==='admin') ra();
}
function delUnpaidOrder(oid) {
    sm('<div class="modal"><div class="modal-header"><h2>删除未收款订单</h2><button class="close-btn" onclick="cm()">✕</button></div><div class="confirm-body"><div class="confirm-text">确认删除该未收款订单？<br><span style="font-size:12px;color:var(--text-dim)">此操作不可恢复</span></div><div class="confirm-actions"><button class="btn" onclick="cm()">取消</button><button class="btn" style="background:var(--red);color:#fff;font-weight:600" onclick="doDelUnpaid('+oid+')">确认删除</button></div></div></div>');
}
async function doDelUnpaid(oid) {
    await dbOp(supabase.from('orders').delete().eq('id',oid));
    orders = orders.filter(function(x){ return x.id!==oid; });
    cm(); if (tab==='admin') ra(); if (tab==='orders') ro(); if (tab==='completed') rc();
}

// 下拉刷新
var tsy=0, pu=false;
document.getElementById('contentArea').addEventListener('touchstart',function(e){ if(this.scrollTop===0){ tsy=e.touches[0].clientY; pu=true; } });
document.getElementById('contentArea').addEventListener('touchmove',function(e){ if(pu&&this.scrollTop===0&&e.touches[0].clientY-tsy>80){ pu=false; refreshAll(); } });
</script>
